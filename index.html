<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title ------------------------------------ -->
    <title>Job Application Tracker</title>
    <!-- google font ------------------------------ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome ----------------------------- -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css -------------------------------------- -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- tailwind --------------------------------- -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <!-- start ------------------------------------ -->
    <div class="w-full min-h-screen bg-[#f8fafc]">
        <div class="w-full max-w-[1110px] mx-auto px-5">
            <div class="w-full pt-[60px]">
                <div class="w-full space-y-5">
                    <h1 class="font-geist text-[32px] text-[#002C5C] font-bold">Job Application Tracker</h1>
                    <div class="w-full grid grid-cols-1 gap-4 sm:grid-cols-3">
                        <div class="w-full p-5 bg-white border border-[#F1F2F4] rounded-lg space-y-2">
                            <p class="font-geist text-sm text-[#323B49] font-medium">Total</p>
                            <span id="jobs-count" class="font-geist text-2xl text-[#002C5C] font-bold">0</span>
                        </div>
                        <div class="w-full p-5 bg-white border border-[#F1F2F4] rounded-lg space-y-2">
                            <p class="font-geist text-sm text-[#323B49] font-medium">Interview</p>
                            <span id="interview-count" class="font-geist text-2xl text-[#10B981] font-bold">0</span>
                        </div>
                        <div class="w-full p-5 bg-white border border-[#F1F2F4] rounded-lg space-y-2">
                            <p class="font-geist text-sm text-[#323B49] font-medium">Rejected</p>
                            <span id="rejected-count" class="font-geist text-2xl text-[#EF4444] font-bold">0</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="w-full border-t border-[#E6E7E9] my-[30px]"></div>
            <div class="w-full">
                <div class="w-full flex items-center justify-between mb-6">
                    <h3 class="font-geist text-xl text-[#002C5C] font-semibold">Available Jobs</h3>
                    <p class="font-geist textbase text-[#64748B] font-medium"><span id="total-count">0</span> jobs</p>
                </div>
                <div class="w-full gap-2 mb-4">
                    <button id="all-tab" class="w-full max-w-20 py-2 px-3 bg-[#3B82F6] border border-[#3B82F6] font-geist text-xs text-white font-medium rounded-sm cursor-pointer">All</button>
                    <button id="interview-tab" class="w-full max-w-20 py-2 px-3 bg-[#ffffff] border border-[#F1F2F4] font-geist text-xs text-[#64748B] font-medium rounded-sm cursor-pointer">Interview</button>
                    <button id="rejected-tab" class="w-full max-w-20 py-2 px-3 bg-[#ffffff] border border-[#F1F2F4] font-geist text-xs text-[#64748B] font-medium rounded-sm cursor-pointer">Rejected</button>
                </div>
                <div class="w-full">
                    <div class="jobs-tab">
                        <div id="all-container" class="w-full min-h-auto grid grid-cols-1 gap-4">
                            <!-- dynamic data from javascript -->
                        </div>
                    </div>
                    <div class="interviews-tab hidden">
                        <div class="w-full min-h-[400px] flex items-center justify-center flex-col gap-5 bg-white border border-[#F1F2F4] rounded-lg">
                            <div class="w-[100px] h-[100px]">
                                <img src="./assets/jobs.png" alt="paper icon">
                            </div>
                            <div class="w-full text-center">
                                <h3 class="font-geist text-2xl text-[#002C5C] font-semibold mb-2">No jobs available</h3>
                                <p class="font-geist text-base text-[#64748B] font-normal">Check back soon for new job opportunities</p>
                            </div>
                        </div>
                    </div>
                    <div class="rejects-tab hidden">
                        <div class="w-full min-h-[400px] flex items-center justify-center flex-col gap-5 bg-white border border-[#F1F2F4] rounded-lg">
                            <div class="w-[100px] h-[100px]">
                                <img src="./assets/jobs.png" alt="paper icon">
                            </div>
                            <div class="w-full text-center">
                                <h3 class="font-geist text-2xl text-[#002C5C] font-semibold mb-2">No jobs available</h3>
                                <p class="font-geist text-base text-[#64748B] font-normal">Check back soon for new job opportunities</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- script ----------------------------------- -->
    <script src="./script/app.js"></script>
</body>
</html>
